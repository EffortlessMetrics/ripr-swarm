# GitHub Repository Settings App contract.
#
# Managed by the GitHub Settings / Probot Settings app. Keep this file focused
# on repo metadata, labels, and branch protection. Security settings, release
# environments, and secrets remain documented in docs/REPO_SETTINGS.md and are
# configured through GitHub settings/API.

repository:
  name: ripr-swarm
  description: "Swarm development lane for ripr: static RIPR evidence for CI, editors, and agents."
  homepage: "https://github.com/EffortlessMetrics/ripr"
  topics: rust, testing, mutation-testing, static-analysis, test-automation, developer-tools, code-coverage, lsp, vscode-extension, sarif, github-actions, ci
  private: false

  default_branch: main

  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true

  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  allow_auto_merge: true
  allow_update_branch: true
  delete_branch_on_merge: true

branches:
  - name: main
    protection:
      required_pull_request_reviews: null
      required_status_checks:
        strict: true
        contexts:
          - Ripr Rust Small Result
      enforce_admins: false
      required_conversation_resolution: false
      required_linear_history: false
      allow_force_pushes: false
      allow_deletions: false
      restrictions: null

labels:
  - name: full-ci
    color: "5319e7"
    description: Run required, advisory, and release-like CI lanes.
  - name: release-check
    color: "b60205"
    description: Run the currently wired release-surface package list and publish dry-run proof.
  - name: vscode
    color: "007acc"
    description: Run editor extension lanes even when no editor path changed.
  - name: coverage
    color: "0e8a16"
    description: Run coverage lanes and upload coverage artifacts.
  - name: ripr-waive
    color: "fbca04"
    description: Acknowledge a soft RIPR static exposure finding for this PR.
  - name: ci-budget-ack
    color: "fef2c0"
    description: Acknowledge an intentional CI budget / LEM overage.
  - name: clippy-future
    color: "d4c5f9"
    description: Run future or candidate Clippy lint lanes in advisory mode.
