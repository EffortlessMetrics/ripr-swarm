name: Publish VSCode Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the VSIX artifact, for example 0.2.0"
        required: true
      publish_vs_marketplace:
        description: "Publish to VS Marketplace"
        required: false
        default: "true"
      publish_open_vsx:
        description: "Publish to Open VSX"
        required: false
        default: "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    env:
      EXTENSION_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: |
          version="${EXTENSION_VERSION#v}"
          mkdir -p dist
          npx @vscode/vsce package --out "dist/ripr-${version}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: ripr-vsix
          path: editors/vscode/dist/*.vsix

  server-assets-ready:
    runs-on: ubuntu-latest
    env:
      RAW_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Wait for server manifest
        run: |
          version="${RAW_VERSION#v}"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${version}/ripr-server-manifest-v${version}.json"
          for attempt in $(seq 1 90); do
            status="$(curl -L -sS -o /dev/null -w "%{http_code}" "$url" || true)"
            if [ "$status" = "200" ]; then
              echo "Found $url"
              exit 0
            fi
            echo "Waiting for $url (attempt $attempt/90, HTTP $status)"
            sleep 20
          done
          echo "Server manifest was not available: $url" >&2
          exit 1

  publish-vs-marketplace:
    needs: [package, server-assets-ready]
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_vs_marketplace != 'false' }}
    runs-on: ubuntu-latest
    env:
      RAW_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/download-artifact@v8
        with:
          name: ripr-vsix
          path: dist

      - name: Require VSCE_PAT
        if: ${{ env.VSCE_PAT == '' }}
        run: |
          echo "::error::VSCE_PAT is not configured; VS Code Marketplace publish cannot run."
          exit 1

      - name: Publish to VS Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: |
          version="${RAW_VERSION#v}"
          vsix_file="dist/ripr-${version}.vsix"
          PUBLISHED_VERSION="$(
            npx -y @vscode/vsce show EffortlessMetrics.ripr --json 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['versions'][0]['version'])" \
              2>/dev/null || echo ""
          )"
          if [ "$PUBLISHED_VERSION" = "$version" ]; then
            echo "::warning::VS Code Marketplace already has version $version; skipping publish."
            exit 0
          fi
          npx -y @vscode/vsce publish --packagePath "$vsix_file" --pat "$VSCE_PAT"

  publish-open-vsx:
    needs: [package, server-assets-ready]
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_open_vsx != 'false' }}
    runs-on: ubuntu-latest
    env:
      RAW_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/download-artifact@v8
        with:
          name: ripr-vsix
          path: dist

      - name: Require OVSX_PAT
        if: ${{ env.OVSX_PAT == '' }}
        run: |
          echo "::error::OVSX_PAT is not configured; Open VSX publish cannot run."
          exit 1

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: |
          version="${RAW_VERSION#v}"
          npx -y ovsx publish "dist/ripr-${version}.vsix" -p "$OVSX_PAT" --skip-duplicate

  attach-release-asset:
    needs: package
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ripr-vsix
          path: dist

      - name: Attach VSIX to GitHub Release
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || gh release create "${{ github.ref_name }}" --title "ripr ${{ github.ref_name }}"
          gh release upload "${{ github.ref_name }}" dist/*.vsix --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
