name: Release ripr Server Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.2.0 or v0.2.0"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ fromJson(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runs_on: '["self-hosted","Windows","X64"]'
            executable: ripr.exe
            archive: zip
          - target: x86_64-unknown-linux-gnu
            runs_on: '["self-hosted","Linux","X64"]'
            executable: ripr
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runs_on: '["self-hosted","Linux","ARM64"]'
            executable: ripr
            archive: tar.gz
          - target: x86_64-apple-darwin
            runs_on: '["self-hosted","macOS","X64"]'
            executable: ripr
            archive: tar.gz
          - target: aarch64-apple-darwin
            runs_on: '["self-hosted","macOS","ARM64"]'
            executable: ripr
            archive: tar.gz

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build ripr
        run: cargo build -p ripr --release --target ${{ matrix.target }}

      - name: Package server archive
        run: cargo xtask release-server-archive --version "${{ github.event.inputs.version || github.ref_name }}" --target "${{ matrix.target }}" --executable "${{ matrix.executable }}" --archive "${{ matrix.archive }}"

      - name: Upload server artifact
        uses: actions/upload-artifact@v7
        with:
          name: ripr-server-${{ matrix.target }}
          path: dist/*

  manifest:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v8
        with:
          pattern: ripr-server-*
          path: dist
          merge-multiple: true

      - name: Generate manifest and checksums
        run: cargo xtask release-server-manifest --version "${{ github.event.inputs.version || github.ref_name }}" --repository "${{ github.repository }}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: cargo xtask release-upload-assets --version "${{ github.event.inputs.version || github.ref_name }}"
