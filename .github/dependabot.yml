version: 2

updates:
  # Rust workspace dependencies.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: deps
      include: scope
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      cargo-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # VS Code extension package.
  - package-ecosystem: npm
    directory: /editors/vscode
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Toronto
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - vscode
      - npm
    commit-message:
      prefix: deps
      include: scope
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      vscode-runtime:
        patterns:
          - "vscode-languageclient"
        update-types:
          - minor
          - patch
      vscode-dev-tools:
        dependency-type: development
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Toronto
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - github-actions
      - ci
    commit-message:
      prefix: deps
      include: scope
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
