# Unsafe-block hygiene. We forbid `unsafe_code` workspace-wide, so these
# never fire on current source. They keep any future, scoped unsafe island
# reviewable: every `unsafe { ... }` must carry a `// SAFETY:` receipt,
# blocks may not bundle multiple unsafe ops, and `repr(packed)` must pin
# an explicit ABI so the layout is not unspecified.
[[active.unsafe_block]]
name = "clippy::undocumented_unsafe_blocks"
level = "deny"

[[active.unsafe_block]]
name = "clippy::multiple_unsafe_ops_per_block"
level = "deny"

[[active.unsafe_block]]
name = "clippy::repr_packed_without_abi"
level = "deny"

