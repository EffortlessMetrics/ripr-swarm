schema_version = "0.1"
msrv = "1.95"

# Declarative ledger of the Rust/Clippy lint policy enforced by ripr.
#
# This file documents intent. The authoritative configuration lives in
# `[workspace.lints.rust]` and `[workspace.lints.clippy]` in `Cargo.toml`,
# applied to every crate via `[lints] workspace = true`.
#
# See docs/CLIPPY_POLICY.md for the dual-rail design (Clippy as the local
# code-shape rail; `cargo xtask check-no-panic-family` as the authoritative
# semantic rail with `policy/no-panic-allowlist.toml`).

[policy]
panic_free_tests = true
allow_test_carveouts = false
suppression_style = "expect-or-allow-with-reason"
blanket_categories = false
unsafe = "forbid"

# Active panic-family Clippy lints at MSRV 1.95. Code-shape rail only;
# semantic enforcement (selector + allowlist) lives in
# `cargo xtask check-no-panic-family`.
[[active.panic_family]]
name = "clippy::dbg_macro"
level = "deny"

[[active.panic_family]]
name = "clippy::todo"
level = "deny"

[[active.panic_family]]
name = "clippy::unimplemented"
level = "deny"

[[active.panic_family]]
name = "clippy::panic"
level = "deny"

[[active.panic_family]]
name = "clippy::unreachable"
level = "deny"

[[active.panic_family]]
name = "clippy::should_panic_without_expect"
level = "deny"

[[active.panic_family]]
name = "clippy::unwrap_used"
level = "deny"
note = "Receipted dual-rail with `#[expect(clippy::unwrap_used, reason = \"...\")]` mirrors per call site, paired with `policy/no-panic-allowlist.toml` entries. Production code paths are forbidden; test fixtures use module-level `#[expect]` blocks listed in `.ripr/allow-attributes.txt`."

[[active.panic_family]]
name = "clippy::expect_used"
level = "deny"
note = "Same dual-rail receipt model as `unwrap_used`."

[[active.panic_family]]
name = "clippy::get_unwrap"
