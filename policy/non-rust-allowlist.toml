kind = "editor_extension_config"
owner = "lsp/editor"
surface = "editor"
classification = "config"
reason = "VS Code extension config or generated metadata."
covered_by = ["cd editors/vscode && npm run compile"]

[[allow]]
glob = "editors/vscode/**/*.ts"
kind = "editor_extension"
owner = "lsp/editor"
surface = "editor"
classification = "production"
reason = "VS Code extension client and tests must stay TypeScript for the VS Code Extension Host API."
