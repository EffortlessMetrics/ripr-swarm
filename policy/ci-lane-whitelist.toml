jobs = ["rust"]
commands = ["cargo package -p ripr --list"]
estimated_lem = 6
artifact_families = ["release-readiness"]
description = "Crate package contents proof."

[[lane]]
id = "publish-dry-run"
posture = "on_demand_release"
workflow = ".github/workflows/ci.yml"
jobs = ["rust"]
commands = ["cargo publish -p ripr --dry-run"]
estimated_lem = 10
artifact_families = ["release-readiness"]
description = "crates.io publish dry-run proof."

[[lane]]
id = "vsix-package"
posture = "on_demand_release"
