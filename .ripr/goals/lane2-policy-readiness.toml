id = "policy-readiness-preview-evidence-governance"
title = "Policy Readiness and Preview Evidence Governance"
status = "tracker"
issue = "https://github.com/EffortlessMetrics/ripr/issues/755"

# Focused Lane 2 tracker. This is not the active Codex Goals manifest.
# `.ripr/goals/active.toml` remains the active execution manifest for
# Campaign 27: Language Adapter Preview.

objective = """
Make RIPR policy decisions auditable across stable Rust evidence and preview
language-adapter evidence. Preserve advisory defaults, keep preview findings
visible but non-gating by default, and define when evidence is eligible for
baseline, waiver, suppression, calibration, RIPR Zero, and gates.
"""

hard_rules = [
  "Evidence stays visible.",
  "Policy decides what evidence means.",
  "Waivers are visible acknowledgements.",
  "Suppressions are durable policy exceptions.",
  "Baselines are adoption checkpoints.",
  "Preview language evidence is advisory until promoted.",
  "Blocking is explicit, narrow, and reversible.",
  "No default CI blocking.",
  "No hidden mutation or runtime-proof claims.",
  "No automatic baseline adoption.",
  "No generated tests.",
]

non_goals = [
  "No analyzer changes.",
  "No LSP/editor behavior changes.",
  "No PR summary rendering changes.",
  "No generated tests.",
  "No mutation execution.",
  "No provider calls.",
  "No release/security changes.",
  "No default CI blocking.",
  "No automatic baseline adoption.",
  "No preview-language gate promotion without explicit later policy.",
]

