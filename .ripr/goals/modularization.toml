id = "modularize-ripr-submodules"
title = "Module SRP Refactoring"
status = "planned"

objective = """
Refactor internal modules under crates/ripr/src/ so each module has one
product responsibility, improving maintainability, testability, and reasoning
without splitting the package. The ripr crate stays one published package with
one library and binary — no internal splits into ripr-core, ripr-cli, etc.
"""

end_state = [
  "Every internal module has a single, clear product responsibility",
  "Module boundaries align with RIPR analysis stages (parse → facts → probes → classify → render)",
  "analysis/mod.rs is a thin orchestration façade, not implementation",
  "rust_index.rs is deleted or a compatibility shim; parsing/extraction is modularized",
  "Classification logic is split into stage-specific modules (reach, activate, infect, etc.)",
  "app.rs is split into use-case modules (check, explain, context)",
  "CLI parsing is decoupled from execution",
  "context_packet exists as a domain DTO",
  "Public API is tightened (internal modules marked #[doc(hidden)] or private)",
  "Test coverage is unchanged or improved",
  "All output artifacts (golden, test-oracle, dogfood) are stable",
  "Architecture guard passes with no exceptions"
]

