id = "policy-operations-promotion-readiness"
title = "Policy Operations and Promotion Readiness"
status = "closed"
issue = "closed by focused Lane 2 closeout"

# Focused Lane 2 tracker. This is not the active Codex Goals manifest.
# `.ripr/goals/active.toml` remains the active execution manifest for
# Campaign 27: Language Adapter Preview.

objective = """
Make RIPR policy adoption operational. Maintainers should be able to see the
current safe policy ceiling, next safe action, blockers to stricter modes,
policy health over time, and read-only promotion packets for stricter modes and
preview-language evidence.
"""

hard_rules = [
  "Evidence stays visible.",
  "Policy decides what evidence means.",
  "Waivers are visible PR-time acknowledgements.",
  "Suppressions are durable policy exceptions.",
  "Baselines are adoption checkpoints, not acceptance forever.",
  "Baseline refresh remains shrink-only unless a later explicit manual adopt-new policy exists.",
  "Calibration is confidence evidence, not runtime proof for static reports.",
  "Gate decisions are explicit, configured, narrow, reversible, and earned.",
  "Preview language evidence is advisory until promoted by later explicit policy.",
  "No default CI blocking.",
  "No automatic config mutation.",
  "No automatic baseline adoption.",
  "No automatic suppression creation.",
]

non_goals = [
  "No analyzer truth changes.",
  "No evidence identity rewrites.",
  "No recommendation ranking changes.",
  "No LSP/editor behavior changes.",
  "No PR/CI front-panel redesign.",
  "No generated tests.",
  "No provider calls.",
  "No mutation execution.",
  "No default CI blocking.",
  "No automatic config mutation.",
  "No automatic baseline adoption.",
  "No automatic suppression creation.",
  "No preview-language gate promotion.",
  "No runtime-proof claims from static evidence.",
]

