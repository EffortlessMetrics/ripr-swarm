id = "first-useful-pr-loop"
title = "First Useful PR Loop"
status = "closed"
no_current_goal = true

# This is Campaign 28 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 27 closed Language Adapter Preview and remains archived under
# `.ripr/goals/archive/2026-05-13-language-adapter-preview.toml`.
# This campaign makes the front-door RIPR product loop boringly useful:
# one changed Rust behavior, one clear weak-oracle gap, one focused repair
# intent, one verification command, and one receipt that users, reviewers, CI,
# and agents can all understand.

objective = """
Make a new user, reviewer, or coding agent get from one changed Rust behavior
to one trustworthy repair receipt with almost no interpretation burden. The
front door is `ripr first-pr --root . --base origin/main --head HEAD`; it must
name the top repairable gap or a clear no-action state, explain the missing
discriminator in reviewer-readable language, give one focused test or output
proof intent, provide exact verify and receipt commands, and preserve the
static-advisory boundary. RIPR still does not edit source, generate tests, call
providers, run mutation, prove runtime or coverage adequacy, or enable default
blocking gates.
"""

end_state = [
  "`ripr first-pr --root . --base origin/main --head HEAD` is the obvious front door for one changed Rust PR",
  "the first screen names one top repairable gap or a clear no-action state without making users open secondary reports",
  "the recommendation explains changed behavior, current proof weakness, missing discriminator, repair intent, verify command, receipt command, and static-evidence boundary",
  "`ripr outcome` receipts are reviewer-native and explain before/after movement without claiming mutation, runtime, or coverage proof",
  "a tiny fixture or demo story proves the before -> recommendation -> focused repair -> outcome -> receipt loop",
  "generated CI, editor, and agent packet surfaces mirror the same one-screen repair story instead of inventing parallel wording",
  "support/status claims remain mapped to proof and preserve advisory/static boundaries",
]

