  "fixture first",
  "audit-driven repairs before heuristics",
  "raw findings remain supporting evidence",
  "canonical items are the countable evidence unit",
  "predicate-boundary actionability still requires concrete activation values",
  "named static limitations are analyzer work, not user test debt",
  "unsupported value flows must stay explicitly limited",
  "runtime-only signal does not create static gaps",
]

