id = "pr-inline-comment-publisher"
title = "PR Inline Comment Publisher"
status = "closed"

# This is Campaign 26 in `docs/IMPLEMENTATION_CAMPAIGNS.md`.
# Campaign 25 closed Report Packet Index. This campaign makes optional durable
# PR comments reviewable before posting and keeps default generated workflows
# comment-free.

objective = """
Define and implement an explicit opt-in inline PR comment publisher over the
existing `ripr review-comments` artifact without changing default generated CI.
The lane must first produce a read-only publish plan from explicit
`target/ripr/review/comments.json` input, then optionally publish only safe
changed-line comments when a workflow explicitly enables it. The publisher must
never post `summary_only` guidance, must cap comments, deduplicate by
`dedupe_key`, upsert or replace prior RIPR comments, preserve advisory
language, avoid hidden analysis reruns, and avoid analyzer, ranking, gate,
editor, provider, mutation, source-edit, generated-test, branch-protection, or
default-blocking changes.
"""

end_state = [
  "`target/ripr/review/comment-publish-plan.json` and `.md` describe intended inline comment operations before anything posts",
  "the plan consumes only explicit `review-comments` artifacts and optional existing-comment metadata",
  "summary-only guidance is never publishable as an inline comment",
  "publishable comments target changed lines only and are capped to three by default",
  "dedupe keys drive upsert or replace behavior so RIPR comments do not duplicate across reruns",
  "generated CI keeps inline comments disabled by default and only posts when explicit configuration and safe permissions exist",
  "fixtures and dogfood receipts cover publishable, summary-only, capped, duplicate, stale-existing, fork or no-token, and missing-input cases",
]

