id = "rust-usable-gap-projection"
title = "Rust Usable Gap Projection"
status = "closed"

objective = """
Make ripr's Rust user-facing surfaces gap-driven and repair-driven. Raw
analyzer findings remain supporting evidence; user interruptions consume
canonical GapRecord records with scope, repair route, anchor, projection
eligibility, verification command, and authority boundary.
"""

end_state = [
  "Finding-to-gap alignment separates raw evidence from user-facing grouping.",
  "Gap decision ledger is the shared decision layer for projectable Rust gaps.",
  "PR repair comments require explicit GapRecord projection eligibility, stable anchors, dedupe, repair route, and verification command.",
  "RIPR Zero, repo badges, and optional gates can consume policy-backed gap records without changing default blocking.",
  "Agent packets and LSP gap diagnostics consume the same GapRecord fields.",
  "Presentation/output text can route to MissingOutputContract and AddOutputGolden when supported evidence identifies output proof as the repair route.",
  "Static-unknown-only evidence remains report-only unless a configured repair route exists.",
  "Preview-language evidence remains opt-in, visibly preview/advisory, and outside Rust gap-repair authority.",
  "Rust gap repair loop is documented as usable, not stable or runtime-confirmed.",
]

non_goals = [
  "No default CI blocking change.",
  "No branch-protection change.",
  "No mutation execution.",
  "No runtime test execution by the gap ledger.",
  "No generated tests.",
  "No automatic source edits.",
  "No provider calls.",
  "No preview-language promotion into RIPR Zero, badges, or gates.",
  "No public crate split.",
]

