objective = """
Keep RIPR operating on canonical evidence items instead of raw findings as new
alignment gaps are measured, without reopening completed presentation-text,
config/policy base scope, editor adoption, release control, or gate authority.
"""

end_state = [
  "alignment coverage by evidence class is auditable",
  "raw findings stay diagnostic and canonical items remain the countable unit",
  "actionable canonical gaps preserve repair-route and verify-command coverage",
  "named static limitation buckets become audit-driven, fixture-backed repair queues",
  "runtime confidence coverage is visible by canonical evidence class without adding mutation execution",
]

hard_rules = [
  "fixture first",
  "audit-driven repairs before heuristics",
  "raw findings remain supporting evidence",
  "canonical items are the countable evidence unit",
  "actionable canonical gaps require repair routes",
  "named limitations are analyzer work, not user test debt",
  "runtime-only signal does not create static gaps",
  "policy/adoption overlays stay separate from Lane 1 evidence state",
]

non_goals = [
  "no PR or CI rendering changes",
  "no inline PR comment publishing",
  "no LSP or editor polish",
  "no gate-policy changes or default blocking",
  "no public badge or score redefinition",
  "no generated tests",
  "no automatic source edits",
  "no provider/model calls",
  "no mutation execution",
]

