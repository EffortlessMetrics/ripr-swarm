# Focused Lane 4 tracker. This is not the active Codex Goals manifest.
# `.ripr/goals/active.toml` remains the active execution manifest for
# Campaign 27: Language Adapter Preview.

objective = """
Turn explicit RIPR PR-time artifacts into a reviewer-first advisory cockpit:
front panel, packet index, generated summary, repair commands, receipts,
language grouping when configured, and clear gate authority boundaries.
"""

end_state = [
  "Existing front panel and packet index remain the shipped baseline.",
  "Generated PR CI workflow behavior is spec-backed.",
  "Missing expected artifacts include regeneration commands.",
  "Gate decision remains the only configured pass/fail authority.",
  "Language-aware grouping is explicitly deferred until preview-language evidence is ready or the lane accepts a narrower grouping slice.",
  "Rust-default generated CI output remains unchanged.",
  "Dogfood receipts cover remaining cockpit gaps.",
  "Lane closeout records shipped surfaces, validation, known limits, and next-lane handoff.",
]

