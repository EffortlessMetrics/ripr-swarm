id = "actionable-surface-translation"
title = "Actionable Surface Translation"
status = "active"
lane = "cross-surface"

# This campaign is selected from repo-owned RIPR-SPEC-0059 after the
# source-of-truth control-plane lane closed with `no_current_goal = true`.
# The campaign translates existing actionable canonical gap evidence across
# badge, PR, editor, swarm dry-run, and outcome surfaces without changing
# analyzer truth or claim authority.

objective = """
Make covered user-facing surfaces lead with the same repair-first question:
what actionable canonical gap remains, what repair route is safe, what verifies
movement, what receipt records it, and what remains advisory or static-only?
"""

end_state = [
  "badge-adjacent copy explains unresolved actionable static repair gaps at point of use",
  "PR evidence leads with actionable delta and one top next repair packet before raw finding totals",
  "editor Show Status leads with one safe repair action or one precise fail-closed reason",
  "swarm dry-run output includes a compact copy-ready operator or external-agent packet",
  "outcome and trend reports lead with receipt-linked movement since the previous refresh",
  "all covered surfaces preserve advisory/static boundaries and avoid runtime, coverage, mutation, gate, policy, or merge-readiness claims",
]

hard_rules = [
  "typed fields decide and prose explains",
  "actionable canonical gaps are the primary public repair unit",
  "raw findings and seam-native inventory remain supporting context",
  "advisory and static boundaries remain visible",
  "gate authority stays with explicit gate artifacts",
  "receipts record static movement only",
]

non_goals = [
  "no analyzer truth changes",
  "no actionable-gap producer or schema changes",
  "no support-tier promotion without a dedicated support-tier PR",
  "no public badge endpoint semantic change in presentation-only slices",
  "no default CI blocking or gate behavior changes",
  "no PR comment publishing changes",
  "no source edits or generated tests",
  "no provider/model calls",
  "no mutation execution",
  "no release, publish, signing, or marketplace work",
  "no runtime adequacy, coverage adequacy, proof-of-correctness, policy eligibility, gate pass/fail, or merge-readiness claim",
]

