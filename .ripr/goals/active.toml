id = "start-here-surface-convergence"
title = "Start-Here Surface Convergence"
status = "active"
issue = "201"

# This is the next active campaign after Campaign 28 closed the First Useful
# PR Loop and intentionally left `no_current_goal = true`. This campaign makes
# the existing start-here, PR/CI, CLI, receipt, policy, dogfood, and docs
# surfaces converge on the same canonical repair unit without changing
# analyzer truth or advisory defaults.

objective = """
Make every start-here surface answer the same user question: what is the one
repairable gap or no-action state, why does it matter, where should the
focused proof go, what verifies movement, what receipt records it, and what
remains limited or advisory?
"""

end_state = [
  "PR/CI summaries and report packets lead with a canonical gap or no-action state instead of raw finding counts",
  "CLI front-door commands use the same safe-next-action and recovery-state vocabulary",
  "receipt lifecycle state is consistent across CLI, PR/CI, editor projection, first-pr packets, and docs",
  "no-output and fail-closed states are explicit outside the editor",
  "preview-language promotion criteria are visible and policy-owned",
  "external-style dogfood proves the converged path on normal repo shapes and failure states",
]

hard_rules = [
  "typed fields over prose",
  "canonical gap and repair route before raw finding count",
  "advisory by default",
  "gate authority stays with explicit gate artifacts",
]

non_goals = [
  "no analyzer behavior changes in the docs/issue setup PR",
  "no output schema changes without a scoped spec-test-code PR",
  "no generated CI blocking or default gate behavior changes",
  "no PR comment publishing changes",
  "no preview-language promotion without a policy-owned promotion packet",
  "no source edits, generated tests, provider/model calls, mutation execution, or editor UI-sprawl work",
]

