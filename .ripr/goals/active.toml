  "start from open PRs and required checks before touching docs or goals",
  "the normalized Ripr Rust Small Result is the only branch-protection-facing check",
  "self-hosted implementation jobs are conditional proof jobs, not required status checks",
  "GitHub-hosted fallback is a valid protected-path success while CX53/CX43 proof is unavailable",
  "runner-image or runner-visibility blockers must be recorded explicitly instead of treated as successful self-hosted proof",
  "source ripr remains release, security, promotion, and publish/distribution authority",
]

non_goals = [
  "no analyzer truth changes",
  "no output schema or product surface changes",
  "no source repo promotion",
  "no release, publish, signing, marketplace, or badge endpoint refresh work",
  "no release/publish/signing secrets in ripr-swarm",
  "no fork PRs on self-hosted runners",
  "no branch-protection expansion beyond Ripr Rust Small Result",
  "no default CI blocking changes beyond the normalized routed result",
  "no provider/model calls",
  "no source edits or generated tests",
  "no mutation execution",
  "no runtime adequacy, coverage adequacy, proof-of-correctness, policy eligibility, gate pass/fail, or merge-readiness claim",
]

