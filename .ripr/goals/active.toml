id = "lane1-value-resolution-static-limits"
title = "Lane 1 Value Resolution Static Limits"
status = "active"
lane = "1"
issue = "285"

# This campaign is the selected successor to the closed Lane 1 Finding
# Alignment Burn-Down rail. It starts from repo-owned scorecard and closeout
# evidence instead of chat memory:
#
# - docs/handoffs/2026-05-22-lane1-finding-alignment-burndown-closeout.md
# - docs/lanes/LANE_1_VALUE_RESOLUTION_STATIC_LIMITS.md
# - plans/lane1-value-resolution-static-limits/implementation-plan.md
#
# The first ready slice is fixture/audit planning. Analyzer behavior changes
# must wait until the supported value-resolution shape is fixture-backed.

objective = """
Burn down the largest remaining value-resolution static limitation bucket with
fixture-backed, audit-driven Lane 1 work. The current evidence-quality
scorecard points at `predicate_boundary` / `activation_value_unresolved` and
the repair route `analysis/value-resolution-audit-fixes`. This campaign keeps
unsupported value-resolution shapes named as static limitations until a
specific supported sub-shape has benchmark coverage and before/after audit
proof.
"""

end_state = [
  "`activation_value_unresolved` remains a named static limitation unless a supported value-resolution shape is fixture-backed",
  "`predicate_boundary` value-resolution work is selected from scorecard and audit evidence",
  "raw findings remain supporting evidence and canonical items remain the countable unit",
  "supported value-resolution sub-shapes move only with positive and must-not-claim fixtures",
  "before/after audit or scorecard deltas report movement without changing public badge, gate, PR/CI, or editor semantics",
]

hard_rules = [
  "fixture first",
  "audit-driven repairs before heuristics",
  "raw findings remain supporting evidence",
  "canonical items are the countable evidence unit",
  "unsupported value-resolution shapes remain named static limitations",
  "do not invent observed activation values",
  "predicate-boundary value checks require concrete discriminator evidence",
  "runtime-only signal does not create static gaps",
]

non_goals = [
  "no PR or CI rendering changes",
  "no inline PR comment publishing",
  "no LSP or editor polish",
  "no gate-policy changes or default blocking",
  "no public badge or score redefinition",
  "no generated tests",
  "no automatic source edits",
  "no provider/model calls",
  "no mutation execution",
]

