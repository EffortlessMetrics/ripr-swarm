id = "lane1-finding-alignment-burndown"
title = "Lane 1 Finding Alignment Burn-Down"
status = "active"
issue = "229"
lane = "Lane 1"

objective = """
Keep RIPR operating on canonical evidence items instead of raw findings as new
alignment gaps are measured, without reopening completed presentation-text or
config/policy base scope.
"""

end_state = [
  "alignment coverage by evidence class is auditable",
  "canonical items have placement and supporting-span evidence where safe",
  "top named static limitation buckets become fixture-backed repair queues",
  "config/policy unsupported-flow expansion is scoped by spec and fixtures",
  "actionable canonical items preserve repair-route and verify-command coverage",
  "internal scorecards keep actionable canonical gaps as the leading work count",
  "runtime confidence coverage is visible by canonical evidence class",
  "dogfood and downstream handoff docs refresh only when material burn-down deltas land",
]

hard_rules = [
  "audit data before screenshots or anecdotes",
  "fixture first for every new class or confidence claim",
  "raw findings remain diagnostic evidence",
  "canonical items are the countable evidence unit",
  "actionable canonical gaps require repair routes",
  "named limitations are analyzer work, not user test debt",
  "runtime-only signal does not create a static gap",
  "policy/adoption overlays stay separate from Lane 1 evidence state",
]

non_goals = [
  "no PR or CI rendering changes in Lane 1",
  "no inline PR comment publishing",
  "no LSP or editor polish",
  "no gate-policy or default-blocking changes",
  "no public badge or score redefinition",
  "no generated tests",
  "no automatic source edits",
  "no provider or model calls",
  "no mutation execution",
  "no release, packaging, platform, dependency, or MSRV cleanup",
]

