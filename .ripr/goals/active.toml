id = "start-here-surface-convergence"
title = "Start-Here Surface Convergence"
status = "active"
issue = "#201"

objective = """
Make PR/CI, CLI, editor handoffs, receipts, no-output states, preview
promotion criteria, and dogfood receipts lead with the same canonical
gap-to-repair unit while preserving advisory/static boundaries.
"""

end_state = [
  "PR/CI summaries and report packets lead with a canonical gap or no-action state instead of raw finding counts.",
  "CLI front-door commands use the same safe-next-action and recovery-state vocabulary.",
  "Receipt lifecycle state is consistent across CLI, PR/CI, editor projection, first-pr packets, and docs.",
  "No-output and fail-closed states are explicit outside the editor.",
  "Preview-language promotion criteria are visible and policy-owned.",
  "External-style dogfood proves the converged path on normal repo shapes and failure states.",
]

hard_rules = [
  "Preserve advisory defaults and static evidence boundaries.",
  "Prefer typed fields over prose-derived action semantics.",
  "Do not change analyzer behavior in docs or policy setup slices.",
  "Do not add generated CI blocking or default gate behavior.",
  "Do not promote preview-language evidence without policy-owned proof.",
]

non_goals = [
  "no analyzer truth changes",
  "no output schema changes unless a scoped behavior PR owns them",
  "no generated CI blocking or default gate behavior changes",
  "no PR comment publishing changes",
  "no preview-language promotion",
  "no source edits, generated tests, provider/model calls, or mutation execution",
  "no runtime, coverage, mutation, merge, or correctness proof claims",
]

