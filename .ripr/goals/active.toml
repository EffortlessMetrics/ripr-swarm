id = "first-useful-pr-loop-continuation"
title = "First Useful PR Loop Continuation"
status = "active"
lane = "cross-surface"

# This successor campaign is selected after Actionable Surface Translation
# closed with `no_current_goal = true`. It continues the archived First Useful
# PR Loop without reactivating the closed campaign id, and makes the existing
# repair-loop machinery easier to use on one real Rust PR before adding broader
# control-plane or automation surfaces.

objective = """
Make a new user, reviewer, or coding-agent operator get from one changed Rust
behavior to one trustworthy repair receipt with minimal interpretation burden.
"""

end_state = [
  "ripr first-pr is the obvious front door for one PR and explains the top repairable gap or clear no-action state",
  "the first screen names changed behavior, weak proof, missing discriminator, focused test intent, verify command, receipt command or path, and advisory/static boundary",
  "ripr outcome receipts are reviewer-native and explain before/after static movement without implying mutation, coverage, correctness, gate, or merge proof",
  "a tiny first-PR demo proves the before -> recommendation -> focused proof -> outcome receipt path",
  "generated CI, VS Code, and agent packets mirror the same top-gap, verify, receipt, and non-claim language instead of introducing a second mental model",
  "support-tier, traceability, and output-contract surfaces record exactly what users may believe",
]

hard_rules = [
  "one PR, one gap, one focused proof, one verification, one receipt",
  "typed fields decide and prose explains",
  "first screens should say what to do next instead of exposing report topology",
  "unknown and no-action states are successful bounded states when evidence is missing or unsafe",
  "static advisory language stays conservative",
  "support tiers remain the public claim boundary",
]

non_goals = [
  "no analyzer truth changes in campaign activation",
  "no source-of-truth namespace duplication",
  "no runner-local goals or parallel docs/source-of-truth stack",
  "no source edits or generated tests",
  "no provider/model calls",
  "no mutation execution",
  "no support-tier promotion without a dedicated proof PR",
  "no default CI blocking or gate behavior changes",
  "no PR comment publishing changes",
  "no release, publish, signing, marketplace, or badge endpoint refresh work",
  "no runtime adequacy, coverage adequacy, proof-of-correctness, policy eligibility, gate pass/fail, or merge-readiness claim",
]

