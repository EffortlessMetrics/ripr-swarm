status = "ready"
branch = "report-finding-alignment-coverage-audit"
stackable = false
plan = "plans/lane1-finding-alignment-burndown/implementation-plan.md"
specs = [
  "RIPR-SPEC-0045",
  "RIPR-SPEC-0043",
  "RIPR-SPEC-0048",
]
acceptance = "Report alignment coverage by evidence class, unaligned raw finding counts, top unaligned examples, duplicate groups, static_unknown_without_named_limitation, canonical_items_without_repair_route, canonical_items_without_verify_command, and raw_to_canonical_ratio without changing public rendering or policy authority."
commands = [
  "cargo xtask lane1-evidence-audit",
  "cargo xtask evidence-quality-scorecard",
  "cargo xtask check-output-contracts",
  "cargo xtask check-pr",
]

